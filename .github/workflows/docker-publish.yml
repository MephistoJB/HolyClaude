name: HolyClaude - Build and Publish GHCR Image

run-name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      max-parallel: 1
      matrix:
        variant: [full, slim]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare image name
        id: prep
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "ghcr_image=ghcr.io/${owner}/holyclaude" >> "$GITHUB_OUTPUT"

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.ghcr_image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/master' && matrix.variant == 'full' }}
            type=raw,value=edge-slim,enable=${{ github.ref == 'refs/heads/master' && matrix.variant == 'slim' }}
            type=sha,prefix=sha-,format=short,enable=${{ matrix.variant == 'full' }}
            type=sha,prefix=sha-,suffix=-slim,format=short,enable=${{ matrix.variant == 'slim' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && matrix.variant == 'full' }}
            type=raw,value=slim,enable=${{ startsWith(github.ref, 'refs/tags/v') && matrix.variant == 'slim' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') && matrix.variant == 'full' }}
            type=semver,pattern={{version}}-slim,enable=${{ startsWith(github.ref, 'refs/tags/v') && matrix.variant == 'slim' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
